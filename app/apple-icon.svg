<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="100%" height="100%"> <defs> <!-- Vibrant Front Layer Gradient (Mint to Primary Green) --> <linearGradient id="g-front" x1="0%" y1="100%" x2="100%" y2="0%"> <stop offset="0%" stop-color="#0f8f67" /> <stop offset="100%" stop-color="#52d4a5" /> </linearGradient> <!-- Deep Back Layer Gradient for Light Backgrounds --> <linearGradient id="g-back-light" x1="0%" y1="0%" x2="100%" y2="100%"> <stop offset="0%" stop-color="#0a6f4f" /> <stop offset="100%" stop-color="#081510" /> </linearGradient> <!-- Mid Back Layer Gradient for Dark Backgrounds --> <linearGradient id="g-back-dark" x1="0%" y1="0%" x2="100%" y2="100%"> <stop offset="0%" stop-color="#0f8f67" /> <stop offset="100%" stop-color="#0a6f4f" /> </linearGradient> <!-- 3D Drop Shadow for the intersection --> <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"> <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#081510" flood-opacity="0.6" /> </filter> <style> @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&amp;display=swap'); .text {  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;  font-weight: 800;  font-size: 76px;  letter-spacing: -0.04em;  fill: #ffffff;  } </style> </defs> <rect width="1024" height="1024" rx="225" fill="#081510" /> <g transform="translate(187, 187) scale(6.5)"> <!-- Back Layer (Top Left to Bottom Right) --> <path d="M 10 10 L 40 10 L 90 60 L 90 90 L 60 90 L 10 40 Z" fill="url(#g-back-dark)" /> <!-- Front Layer (Bottom Left to Top Right) with Shadow/Cutout --> <path d="M 10 90 L 40 90 L 90 40 L 90 10 L 60 10 L 10 60 Z" fill="url(#g-front)" filter="url(#shadow)"  /> </g> </svg>